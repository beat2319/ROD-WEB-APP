<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rapid 'Ōhi'a Death - Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    
    <style>
        * { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; height: 100%; background-color: #DEC79F; font-family: 'EB Garamond', serif; overflow: hidden; }

        /* MAIN COLUMN RULES: 30% | 8% | 62% */
        .dashboard {
            display: flex;
            width: 100vw;
            height: 100vh;
        }

        .sidebar-container { flex: 30; display: flex; flex-direction: column; height: 100%; border-right: 1px solid rgba(0,0,0,0.1); }
        .gutter { flex: 8; background-color: #922b3e; /* Matching your red bar indicator */ }
        .right-side-container { flex: 62; display: flex; flex-direction: column; height: 100%; }

        /* SIDEBAR VERTICAL RULES: 35% | 5% | 60% */
        .beetle-section { 
            flex: 35; 
            display: flex; /* 50/50 split inside */
            padding: 20pt;
            overflow: hidden;
        }
        .sidebar-spacer { flex: 5; background-color: #922b3e; /* Red spacer from diagram */ }
        .ungulate-section { 
            flex: 60; 
            padding: 20pt;
            overflow-y: auto;
        }

        /* BEETLE SECTION 50/50 SPLIT */
        .beetle-img-box { flex: 1; display: flex; align-items: center; justify-content: center; padding-right: 10pt; }
        .beetle-text-box { flex: 1; padding-left: 10pt; font-size: 11pt; line-height: 1.4; }
        .illustration { max-width: 100%; height: auto; }

        /* RIGHT SIDE VERTICAL RULES: 5% | 80% | 15% */
        .map-top-spacer { flex: 5; background: #96B85D; /* Green bar from diagram */ display: flex; align-items: center; padding: 0 20pt; font-weight: bold; }
        
        .map-area { 
            flex: 80; 
            position: relative; 
            padding: 10pt;
        }
        #map-placeholder { 
            width: 100%; height: 100%; 
            background: #5591D7; border: 1px solid #333; 
            display: flex; align-items: center; justify-content: center;
        }

        .footer { 
            flex: 15; 
            padding: 15pt 20pt; 
            background: #DCC7A1; 
            border-top: 2px solid #96B85D;
            display: flex;
            align-items: center;
            gap: 20pt;
        }

        /* Filter Buttons (Positioned 5% from top) */
        .filter-btn {
            position: absolute;
            top: 15pt;
            background: #F4E4BC;
            border: 1px solid #000;
            padding: 5px 15px;
            cursor: pointer;
            z-index: 10;
        }
        .left-btn { left: 20pt; }
        .right-btn { right: 20pt; }

    </style>
</head>
<body>

    <div class="dashboard">
        
        <div class="sidebar-container">
            <div class="beetle-section">
                <div class="beetle-img-box">
                    <img src="beetle.png" alt="Beetle" class="illustration">
                </div>
                <div class="beetle-text-box">
                    <p>Wood boring ambrosia beetles play a central role in the spread of 'Ōhi'a death...</p>
                </div>
            </div>

            <div class="sidebar-spacer"></div>

            <div class="ungulate-section">
                <img src="ungulates.png" alt="Ungulates" class="illustration" style="width: 100%; margin-bottom: 10pt;">
                <p>The spatial patterns of 'Ōhi'a mortality observed across all four sites...</p>
            </div>
        </div>

        <div class="gutter"></div>

        <div class="right-side-container">
            <div class="map-top-spacer">
                Monthly Rapid 'Ōhi'a Death Detections
            </div>

            <div class="map-area">
                <button class="filter-btn left-btn">Filter By Island</button>
                <button class="filter-btn right-btn">Filter By Date</button>
                <div id="map-placeholder">
                    [Map Interaction Area]
                </div>
            </div>

            <footer class="footer">
                <img src="forest.png" alt="Forest" style="height: 80%;">
                <p style="font-size: 11pt;">'Ōhi'a forests cover 865,000 acres across the State of Hawai'i...</p>
            </footer>
        </div>

    </div>

</body>
</html>
